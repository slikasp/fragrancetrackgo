{{define "my_fragrances_page"}}
{{template "base_top" .}}

<section class="card">
  <h2>My Fragrances</h2>
  <p class="muted">Manage fragrances saved in your local <code>ratings</code> table.</p>

  <form method="post" action="/my-fragrances/add" hx-post="/my-fragrances/add" hx-target="#my-fragrance-feedback" hx-swap="innerHTML">
    <div class="row-inline">
      <div>
        <label>Brand</label>
        <input type="text" name="brand" required>
      </div>
      <div>
        <label>Name</label>
        <input type="text" name="name" required>
      </div>
    </div>

    <div class="row-inline" style="margin-top:0.6rem;">
      <div>
        <label>Rating (0-10)</label>
        <input type="number" name="rating" min="0" max="10">
      </div>
      <div>
        <label>Comment</label>
        <textarea name="comment"></textarea>
      </div>
    </div>

    <button style="margin-top:0.75rem;" type="submit">Add To My Fragrances</button>
  </form>

  <div id="my-fragrance-feedback"></div>

  <table>
    <thead>
      <tr>
        <th>Brand</th>
        <th>Name</th>
        <th>Rating</th>
        <th>Comment</th>
      </tr>
    </thead>
    <tbody id="my-fragrance-results" hx-get="/my-fragrances/list" hx-trigger="load, fragranceAdded from:body" hx-swap="innerHTML">
      {{template "my_fragrance_rows" .}}
    </tbody>
  </table>
</section>

{{template "base_bottom" .}}
{{end}}
