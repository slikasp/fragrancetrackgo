{{define "my_rating_rows"}}
{{if .MyRatings}}
  {{range .MyRatings}}
  <tr>
    <td>{{.Brand}}</td>
    <td>{{.Name}}</td>
    <td>{{.Rating}}</td>
    <td>{{.Comment}}</td>
    <td class="cell-actions">
      <button
        class="icon-btn edit-rating-btn"
        type="button"
        title="Edit score and comment"
        aria-label="Edit {{.Brand}} {{.Name}}"
        data-brand="{{.Brand}}"
        data-name="{{.Name}}"
        data-rating="{{.RatingValue}}"
        data-comment="{{.CommentValue}}">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M3 17.25V21h3.75l11-11-3.75-3.75-11 11Zm17.71-10.04a1 1 0 0 0 0-1.41l-2.5-2.5a1 1 0 0 0-1.41 0l-1.96 1.96 3.75 3.75 2.12-2.09Z"></path>
        </svg>
      </button>
      <form
        class="inline action-inline"
        method="post"
        action="/my-ratings/remove"
        hx-post="/my-ratings/remove"
        hx-target="#my-ratings-feedback"
        hx-swap="innerHTML"
        hx-confirm="Remove {{.Brand}} {{.Name}} from your ratings?">
        <input type="hidden" name="brand" value="{{.Brand}}">
        <input type="hidden" name="name" value="{{.Name}}">
        <button
          class="icon-btn danger-icon-btn"
          type="submit"
          title="Remove fragrance"
          aria-label="Remove {{.Brand}} {{.Name}}">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M9 3h6l1 2h4v2H4V5h4l1-2Zm-2 6h2v9H7V9Zm4 0h2v9h-2V9Zm4 0h2v9h-2V9ZM6 21h12l1-13H5l1 13Z"></path>
          </svg>
        </button>
      </form>
    </td>
  </tr>
  {{end}}
{{else}}
<tr>
  <td colspan="5" class="muted">No fragrances saved yet.</td>
</tr>
{{end}}
{{end}}
