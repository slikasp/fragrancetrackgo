version: "2"
sql:
  - engine: "postgresql"
    schema: "sql/schema/local"
    queries: "sql/queries/local"
    gen:
      go:
        package: "localDatabase"
        out: "internal/database/localDatabase"

  - engine: "postgresql"
    schema: "sql/schema/remote/fragrances.sql"
    queries: "sql/queries/remote"
    gen:
      go:
        package: "remoteDatabase"
        out: "internal/database/remoteDatabase"